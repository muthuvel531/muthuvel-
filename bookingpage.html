<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bookings</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: #0f0f15;
            color: white;
            display: flex;
            justify-content: center;
            padding: 15px;
        }

        .container {
            max-width: 360px;
            width: 100%;
        }

        .containe {
            padding: 20px;
            border-radius: 18px;
            background: #14141d;
            box-shadow: 0 0 12px rgba(194, 165, 255, 0.25);
        }

        .header {
            text-align: center;
            margin-bottom: 12px;
        }

        h1 {
            margin: 0;
            font-weight: 600;
            font-size: 24px;
        }

        .booking-card {
            background: #1c1c25;
            padding: 15px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 18px;
            width: 300px;
            box-shadow: 0 0 5px rgba(90, 90, 100, 0.3);
        }

        .service-img {
            width: 70px;
            height: 70px;
            border-radius: 12px;
            background: #1c1c25;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            color: #c08aff;
        }

        .details h3 {
            margin: 0;
            font-size: 15px;
            font-weight: 600;
        }

        .details p {
            margin: 3px 0;
            font-size: 13px;
            color: #ccc;
        }

        .actions {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .btn-msg,
        .btn-cancel {
            border: none;
            padding: 7px 14px;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
            width: 80px;
            text-align: center;
        }

        .btn-msg    { background: #25D366; color: white; }
        .btn-cancel { background: #e74c3c; color: white; }

        .empty {
            text-align: center;
            margin-top: 25px;
            color: #aaa;
            font-size: 14px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="containe">
            <div class="header">
                <h1>My Bookings</h1>
            </div>
            <div id="bookingList"></div>
        </div>
    </div>

    <script>
        const serviceIcons = {
            Plumbing:   "fa-wrench",
            Electrical: "fa-bolt",
            Cleaning:   "fa-broom",
            Carpentry:  "fa-screwdriver-wrench",
            Painting:   "fa-paint-roller"
        };

        let bookings = JSON.parse(localStorage.getItem("bookings")) || [];

        // Assign default icons
        bookings = bookings.map(b => ({
            ...b,
            icon: b.icon || serviceIcons[b.service] || "fa-circle"
        }));
        localStorage.setItem("bookings", JSON.stringify(bookings));

        let upcoming = bookings.filter(b => b.status === "Upcoming");

        function render() {
            const list = document.getElementById("bookingList");
            list.innerHTML = "";

            if (upcoming.length === 0) {
                list.innerHTML = '<p class="empty">No upcoming bookings.</p>';
                return;
            }

            upcoming.forEach((b, index) => {
                const card = document.createElement("div");
                card.className = "booking-card";
                card.innerHTML = `
                    <div class="service-img"><i class="fa-solid ${b.icon}"></i></div>
                    <div class="details">
                        <h3>${b.service}</h3>
                        <p>${b.name || ""}</p>
                        <p>${b.price || ""}</p>
                    </div>
                    <div class="actions">
                        <button class="btn-msg"    onclick="sendWhatsApp(${index})">Message</button>
                        <button class="btn-cancel" onclick="markCancelled(${index})">Cancel</button>
                    </div>`;
                list.appendChild(card);
            });
        }

        function markCancelled(index) {
            upcoming[index].status = "Cancelled";

            let all = JSON.parse(localStorage.getItem("bookings")) || [];
            all = all.map(b =>
                b.name === upcoming[index].name && b.service === upcoming[index].service
                    ? { ...b, status: "Cancelled" }
                    : b
            );
            localStorage.setItem("bookings", JSON.stringify(all));
            upcoming = upcoming.filter(b => b.status === "Upcoming");
            render();
        }

        function sendWhatsApp(index) {
            const b = upcoming[index];
            const message = `Hi, I want to talk about my booking:\nService: ${b.service}\nName: ${b.name || ""}\nPrice: ${b.price || "N/A"}`;
            window.open("https://wa.me/916381893332?text=" + encodeURIComponent(message));
        }

        render();
    </script>
</body>

</html>
