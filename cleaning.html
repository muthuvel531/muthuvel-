<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cleaning Services</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Poppins", sans-serif;
        }

        body {
            background: #0f0f17;
            padding: 20px;
            color: white;
        }

        .app {
            max-width: 420px;
            margin: auto;
        }

        .header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }

        .header i {
            font-size: 22px;
            color: white;
            cursor: pointer;
            transition: 0.3s ease;
            background: #2a2a40;
            padding: 8px;
            border-radius: 50%;
        }

        .header i:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .header i:active {
            transform: scale(0.85);
        }

        .search-box {
            background: #1c1c27;
            padding: 14px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid #2d2d38;
            box-shadow: 0 0 10px rgba(150, 150, 200, 0.1);
            margin-bottom: 25px;
        }

        .search-box input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #f1f1f1;
            font-size: 15px;
        }

        .search-box i {
            color: #b0b0ba;
            font-size: 17px;
        }

        .card {
            background: #1c1c27;
            padding: 16px;
            border-radius: 18px;
            margin-top: 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            border: 1px solid #2a2a36;
            cursor: pointer;
            transition: 0.25s ease;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.25);
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 6px 20px rgba(150, 150, 255, 0.22);
        }

        .card:active {
            transform: scale(0.96);
        }

        .avatar {
            width: 75px;
            height: 75px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #2c2c3a;
            font-size: 30px;
            color: #c08aff;
        }

        .card-content .name {
            font-size: 12px;
            opacity: 0.65;
        }

        .card-content h3 {
            font-size: 18px;
            margin: 4px 0;
            font-weight: 600;
        }

        .no-results {
            margin-top: 40px;
            text-align: center;
            opacity: 0.6;
            font-size: 15px;
        }

        @media (max-width: 360px) {
            .avatar {
                width: 65px;
                height: 65px;
                font-size: 25px;
            }

            .card-content h3 {
                font-size: 16px;
            }
        }
    </style>
</head>

<body>
    <div class="app">
        <div class="header">
            <i class="fa fa-arrow-left" onclick="window.location.href='home.html'"></i>
        </div>

        <div class="search-box">
            <i class="fa fa-search"></i>
            <input type="text" id="searchInput" placeholder="Search cleaning services...">
        </div>

        <p class="no-results" id="noResults" style="display:none;">No services found</p>

        <div id="cardList"></div>
    </div>

    <script>
        const services = [
            { name: "Chantal Shelburne",  service: "Home Cleaning",        icon: "fa-broom",          page: "cleaningbook.html" },
            { name: "Lauralee Quintero",  service: "Kitchen Cleaning",      icon: "fa-utensils",       page: "cleaningbook2.html" },
            { name: "Geoffrey Mott",      service: "Toilet Cleaning",       icon: "fa-toilet",         page: "cleaningbook3.html" },
            { name: "Leatrice Handler",   service: "Window Cleaning",       icon: "fa-window-restore", page: "cleaningbook4.html" },
            { name: "Leatrice Handler",   service: "All Work In Cleaning",  icon: "fa-house",          page: "cleaningbook5.html" }
        ];

        function saveBooking(item) {
            let bookings = JSON.parse(localStorage.getItem("bookings")) || [];
            bookings.push({ name: item.name, service: item.service, icon: item.icon, status: "Upcoming" });
            localStorage.setItem("bookings", JSON.stringify(bookings));
            window.location.href = item.page;
        }

        function renderCards(list) {
            const container = document.getElementById("cardList");
            const noResults = document.getElementById("noResults");
            container.innerHTML = "";
            noResults.style.display = list.length === 0 ? "block" : "none";
            list.forEach((item, i) => {
                const card = document.createElement("div");
                card.className = "card";
                card.innerHTML = `
                    <div class="avatar"><i class="fa-solid ${item.icon}"></i></div>
                    <div class="card-content">
                        <p class="name">${item.name}</p>
                        <h3>${item.service}</h3>
                    </div>`;
                card.onclick = () => saveBooking(item);
                container.appendChild(card);
            });
        }

        renderCards(services);

        document.getElementById("searchInput").addEventListener("input", function () {
            const val = this.value.toLowerCase();
            renderCards(services.filter(s => s.service.toLowerCase().includes(val)));
        });
    </script>
</body>

</html>
